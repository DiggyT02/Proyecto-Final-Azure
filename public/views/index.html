<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Azure IA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 8px;
    }

    .sidebar-title {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 0 8px 20px;
      border-bottom: 1px solid #ffffff22;
      margin-bottom: 8px;
    }

    .nav-item-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: none;
      color: #adb5bd;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 8px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item-btn:hover {
      background: #ffffff11;
      color: #fff;
    }

    .nav-item-btn.active {
      background: #0d6efd22;
      color: #fff;
      border-left: 3px solid #0d6efd;
    }

    .nav-item-btn.active.dota {
      background: #dc354522;
      border-left-color: #dc3545;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      overflow-y: auto;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 16px 28px;
      font-size: 16px;
      font-weight: 600;
      color: #212529;
    }

    .view {
      display: none;
      padding: 28px;
      flex: 1;
    }

    .view.active {
      display: flex;
      flex-direction: column;
    }

    /* ── Chat ── */
    #mensajes {
      height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-bot {
      background: #e9ecef;
      border-radius: 10px;
      border-top-left-radius: 2px;
      padding: 8px 12px;
      max-width: 78%;
      align-self: flex-start;
      font-size: 14px;
    }

    .msg-user {
      background: #0d6efd;
      color: white;
      border-radius: 10px;
      border-top-right-radius: 2px;
      padding: 8px 12px;
      max-width: 78%;
      align-self: flex-end;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-title">Azure IA</div>

    <button class="nav-item-btn dota active" onclick="mostrarVista('dota', this)">
      <span>🎮</span> Chatbot Dota 2
    </button>

    <button class="nav-item-btn" onclick="mostrarVista('resumen', this)">
      <span>📄</span> Resumidor de Texto
    </button>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <div class="main-header" id="main-header">Chatbot Dota 2</div>

    <!-- Vista: Dota 2 -->
    <div id="vista-dota" class="view active">
      <div class="card shadow-sm" style="max-width: 640px;">

        <div class="card-header bg-danger text-white fw-bold d-flex justify-content-between align-items-center">
          <span>Asistente Dota 2</span>
          <small id="tokens-badge" class="badge bg-light text-dark">tokens: 0</small>
        </div>

        <div class="card-body">
          <div id="mensajes" class="border rounded bg-white p-3 mb-3">
            <div class="msg-bot">
              hola!! soy tu asistente de dota 2, preguntame lo que quieras sobre el juego
            </div>
          </div>

          <div class="input-group mb-2">
            <input
              type="text"
              id="input-usuario"
              class="form-control"
              placeholder="escribe tu pregunta..."
              onkeydown="if(event.key==='Enter') enviar()"
            />
            <button id="btn-enviar" class="btn btn-danger fw-bold" onclick="enviar()">Enviar</button>
          </div>

          <div id="estado" class="text-muted text-center" style="font-size:12px; min-height:16px;"></div>
        </div>

      </div>
    </div>

    <!-- Vista: Resumidor -->
    <div id="vista-resumen" class="view">
      <div class="card shadow-sm" style="max-width: 640px;">

        <div class="card-header bg-primary text-white fw-bold">
          Resumidor de Texto (Azure Language)
        </div>

        <div class="card-body">
          <textarea
            id="texto-largo"
            class="form-control mb-2"
            rows="6"
            placeholder="pega aqui el texto que quieres resumir..."
          ></textarea>

          <button id="btn-resumir" class="btn btn-primary fw-bold w-100 mb-2" onclick="resumir()">
            Resumir
          </button>

          <div id="estado-resumen" class="text-muted text-center mb-2" style="font-size:12px; min-height:16px;"></div>

          <div id="resultado-resumen" class="border rounded bg-white p-3" style="min-height:60px; font-size:14px;"></div>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../frontjs/bot-dota.js"></script>
<script src="../frontjs/resumen.js"></script>
<script>
  const titulos = {
    dota:   'Chatbot Dota 2',
    resumen: 'Resumidor de Texto'
  };

  function mostrarVista(nombre, btnClickeado) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item-btn').forEach(b => b.classList.remove('active'));

    document.getElementById('vista-' + nombre).classList.add('active');
    btnClickeado.classList.add('active');
    document.getElementById('main-header').textContent = titulos[nombre];
  }
</script>

</body>
</html>
