<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Azure IA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }

    .layout {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 8px;
    }

    .sidebar-title {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 0 8px 20px;
      border-bottom: 1px solid #ffffff22;
      margin-bottom: 8px;
    }

    .nav-item-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: none;
      color: #adb5bd;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 8px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item-btn:hover               { background: #ffffff11; color: #fff; }
    .nav-item-btn.active              { color: #fff; border-left: 3px solid; }
    
    .nav-item-btn.active.resumen      { background: #0d6efd22; border-left-color: #0d6efd; }
    .nav-item-btn.active.anonimizar   { background: #19875422; border-left-color: #198754; }
    .nav-item-btn.active.sentimientos { background: #fd7e1422; border-left-color: #fd7e14; }
    .nav-item-btn.active.vision       { background: #6f42c122; border-left-color: #6f42c1; }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: auto;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 16px 28px;
      font-size: 16px;
      font-weight: 600;
      color: #212529;
    }

    .view          { display: none; padding: 28px; flex: 1; }
    .view.active   { display: flex; flex-direction: column; }

    /* ── Chat ── */
    #mensajes {
      height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-bot {
      background: #e9ecef;
      border-radius: 10px;
      border-top-left-radius: 2px;
      padding: 8px 12px;
      max-width: 78%;
      align-self: flex-start;
      font-size: 14px;
    }

    .msg-user {
      background: #0d6efd;
      color: white;
      border-radius: 10px;
      border-top-right-radius: 2px;
      padding: 8px 12px;
      max-width: 78%;
      align-self: flex-end;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-title">Azure IA</div>


    <button class="nav-item-btn resumen" onclick="mostrarVista('resumen', this)">
       Resumidor de Texto
    </button>

    <button class="nav-item-btn anonimizar" onclick="mostrarVista('anonimizar', this)">
       Anonimizador de Datos
    </button>

    <button class="nav-item-btn sentimientos" onclick="mostrarVista('sentimientos', this)">
      Análisis de Sentimientos
    </button>

    <button class="nav-item-btn vision" onclick="mostrarVista('vision', this)">
      Detección de Imágenes
    </button>
  </aside>

  <!-- ── Contenido principal ── -->
  <div class="main">


    <!-- Vista: Resumidor -->
    <div id="vista-resumen" class="view">
      <div class="card shadow-sm" style="max-width: 640px;">

        <div class="card-header bg-primary text-white fw-bold">
          Resumidor de Texto (Azure Language)
        </div>

        <div class="card-body">
          <textarea
            id="texto-largo"
            class="form-control mb-2"
            rows="6"
            placeholder="pega aqui el texto que quieres resumir..."
          ></textarea>

          <button id="btn-resumir" class="btn btn-primary fw-bold w-100 mb-2" onclick="resumir()">
            Resumir
          </button>

          <div id="estado-resumen" class="text-muted text-center mb-2" style="font-size:12px; min-height:16px;"></div>

          <div id="resultado-resumen" class="border rounded bg-white p-3" style="min-height:60px; font-size:14px;"></div>
        </div>

      </div>
    </div>

    <!-- Vista: Anonimizador -->
    <div id="vista-anonimizar" class="view">
      <div class="card shadow-sm" style="max-width: 640px;">

        <div class="card-header bg-success text-white fw-bold">
          Anonimizador de Datos (Azure Language)
        </div>

        <div class="card-body">
          <textarea
            id="texto-pii"
            class="form-control mb-2"
            rows="5"
            placeholder="pega aqui el texto con datos sensibles (nombres, DNI, teléfonos, emails...)..."
          ></textarea>

          <button id="btn-anonimizar" class="btn btn-success fw-bold w-100 mb-2" onclick="anonimizar()">
            Anonimizar
          </button>

          <div id="estado-anonimizar" class="text-muted text-center mb-2" style="font-size:12px; min-height:16px;"></div>

          <div class="mb-2">
            <label class="form-label fw-semibold" style="font-size:13px">Texto anonimizado:</label>
            <div id="resultado-anonimizado" class="border rounded bg-white p-3" style="min-height:48px; font-size:14px; word-break:break-word;"></div>
          </div>

          <div>
            <label class="form-label fw-semibold" style="font-size:13px">Entidades detectadas:</label>
            <div id="lista-entidades" class="p-2" style="min-height:32px;"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Vista: Análisis de Sentimientos -->
    <div id="vista-sentimientos" class="view">
      <div class="card shadow-sm" style="max-width: 640px;">

        <div class="card-header fw-bold text-white" style="background:#fd7e14">
          Análisis de Sentimientos (Azure Language)
        </div>

        <div class="card-body">

          <div id="contenedor-textos" class="mb-2">
            <div class="d-flex gap-2 mb-2" id="fila-1">
              <textarea class="form-control texto-sentimiento" rows="2"
                placeholder="Texto 1..."></textarea>
            </div>
          </div>

          <div class="d-flex gap-2 mb-3">
            <button class="btn btn-outline-secondary btn-sm" onclick="agregarTexto()">
              + Añadir texto
            </button>
            <small class="text-muted align-self-center">máximo 5 textos</small>
          </div>

          <button id="btn-analizar" class="btn fw-bold w-100 mb-2 text-white"
            style="background:#fd7e14; border-color:#fd7e14" onclick="analizarSentimientos()">
            Analizar
          </button>

          <div id="estado-sentimientos" class="text-muted text-center mb-2"
            style="font-size:12px; min-height:16px;"></div>

          <div id="resultado-sentimientos"></div>
        </div>

      </div>
    </div>

    <!-- Vista: Detección de Imágenes -->
    <div id="vista-vision" class="view">
      <div class="card shadow-sm" style="max-width: 680px;">

        <div class="card-header fw-bold text-white" style="background:#6f42c1">
          Detección de Imágenes (Azure Computer Vision)
        </div>

        <div class="card-body">

          <div class="input-group mb-3">
            <input
              type="text"
              id="input-imagen-url"
              class="form-control"
              placeholder="pega aqui la URL de la imagen..."
              onkeydown="if(event.key==='Enter') analizarImagen()"
            />
            <button id="btn-vision" class="btn fw-bold text-white"
              style="background:#6f42c1; border-color:#6f42c1" onclick="analizarImagen()">
              Analizar
            </button>
          </div>

          <div id="estado-vision" class="text-muted text-center mb-2"
            style="font-size:12px; min-height:16px;"></div>

          <img id="preview-imagen"
            class="img-fluid rounded mb-3 d-none"
            style="max-height:260px; object-fit:cover; width:100%"
            alt="preview"
          />

          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:13px">Descripción:</label>
            <div id="resultado-descripcion" class="border rounded bg-white p-2"
              style="min-height:44px; font-size:14px;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:13px">Etiquetas detectadas:</label>
            <div id="resultado-etiquetas" class="p-1" style="min-height:32px;"></div>
          </div>

          <div>
            <label class="form-label fw-semibold" style="font-size:13px">Objetos y posición:</label>
            <ul id="resultado-objetos" class="list-group" style="min-height:32px;"></ul>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../frontjs/resumen.js"></script>
<script src="../frontjs/anonimizar.js"></script>
<script src="../frontjs/sentimientos.js"></script>
<script src="../frontjs/vision.js"></script>
<script>
  const titulos = {
    
    resumen:      'Resumidor de Texto',
    anonimizar:   'Anonimizador de Datos',
    sentimientos: 'Análisis de Sentimientos',
    vision:       'Detección de Imágenes'
  };

  function mostrarVista(nombre, btnClickeado) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('vista-' + nombre).classList.add('active');
    btnClickeado.classList.add('active');
    document.getElementById('main-header').textContent = titulos[nombre];
  }
</script>

</body>
</html>
